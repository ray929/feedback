name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o feedback-server .

      - name: Package artifact
        run: |
          PKG_NAME="feedback-server-${{ inputs.version }}-linux-amd64"
          zip -j "${PKG_NAME}.zip" "feedback-server"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: feedback-server-${{ inputs.version }}-linux-amd64
          path: feedback-server-${{ inputs.version }}-linux-amd64.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: artifacts/**/*.zip
          make_latest: true
